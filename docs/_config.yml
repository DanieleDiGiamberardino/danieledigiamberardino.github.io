### Site Settings ###
title               : Daniele Di Giamberardino
description         : >-
                      Neo-laureato Magistrale in Ingegneria dell'Automazione presso l'Università degli Studi di Roma 'Tor Vergata'.
                      Appassionato di dinamica dei sistemi e controllo, sono alla ricerca di un tirocinio formativo per applicare le mie competenze su progetti industriali concreti.
baseurl             : ""            # Lascia le virgolette vuote!
repository          : danieledigiamberardino/danieledigiamberardino.github.io
remote_theme        : yousinix/portfolYOU
open_new_tab        : false                    # Opens external URLs in new tab (works for posts, projects and navbar only)


### Plugins ###
plugins:
  - jemoji


### Navbar Settings ###
nav_exclude:                                            # The following paths are excluded from navbar
  - pages/tags.html
  - pages/404.html
  - pages/index.md
  - documentation/partials/**                           # For Documentation Only


### Author Info ###
author:
  name              : Daniele Di Giamberardino
  image             : 
  behance           : your_username
# dribbble          : your_username
  email             : danieledigiambi@gmail.com
  facebook          : your_username
  github            : danieledigiamberardino
# gitlab            : your_username
# instagram         : your_username
# kaggle            : your_username
  linkedin          : Daniele Di Giamberardino
  medium            : your_username
# soundcloud        : your_username
# spotify           : your_username
# stackoverflow     : your_user_id
# tumblr            : your_username.tumblr.com
# twitch            : your_username
  twitter           : your_username
# vimeo             : your_username
# youtube           : your_channel_name
# keybase           : your_username


### Posts ###
permalink: /blog/:title


### Collections ###
collections:
  projects:
    output: true
    permalink: /projects/:name
  elements:                                             # For Documentation Only
    output: true                                        # For Documentation Only


### Disqus ###
disqus:
  shortname: your-short-name-disqus                     # Your website Shortname on disqus


### Analytics ###
analytics:
  enabled: false                                        # Set true to enable analytics
  google:
    tracking_id: your-google-tracking-id


### Buy me a coffee ###
# See https://www.buymeacoffee.com/
buymeacoffee:
  enabled: false
  username: your_username
  color: "#007bff"
  message: ""                    # Message to be displayed aside from the button for a few seconds.
  description: ""


### Defaults for collections ###
defaults:
  - scope:
      path: ""
      type: "projects"
    values:
      layout: "page"
  - scope:                                              # For Documentation Only
      path: ""                                          # For Documentation Only
      type: "elements"                                  # For Documentation Only
    values:                                             # For Documentation Only
      layout: "element"                                 # For Documentation Only
  - scope:
      path: ""
      type: "posts"
    values:
      comments: false                                   # Set to true to enable disqus comments


### Exclude from processing ###
exclude:
  - README.md
  - CONTRIBUTING.md
  - LICENSE
  - "*.log"
